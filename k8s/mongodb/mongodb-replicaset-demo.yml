---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-admin-password
  namespace: mongodb
type: Opaque
data:
  password: QWJjRGVmMTIz    # echo -n 'AbcDef123' | base64
---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mdb-demo
  namespace: mongodb
spec:
  members: 3
  type: ReplicaSet
  version: "6.0.5"
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - db: admin
      name: root
      passwordSecretRef:
        name: mongodb-admin-password
        key: password
      scramCredentialsSecretName: scram
      roles:
        - db: admin
          name: root
  additionalMongodConfig:
    storage.wiredTiger.engineConfig.journalCompressor: zlib
  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            storageClassName: ssd # Huawei Cloud
            # storageClassName: gp2 # AWS Cloud
            accessModes: [ "ReadWriteOnce" ]
            resources:
              requests:
                storage: 10Gi
        - metadata:
            name: logs-volume
          spec:
            storageClassName: ssd # Huawei Cloud
            # storageClassName: gp2 # AWS Cloud
            accessModes: [ "ReadWriteOnce" ]
            resources:
              requests:
                storage: 2Gi
