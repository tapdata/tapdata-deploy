{{- if .Values.ingress.enabled }}
{{- $apiserver := index .Values "tapdata-apiserver" }}
{{- $server := index .Values "tapdata-server" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name | default (printf "%s-ingress" .Release.Name) }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - http:
        paths:
          {{- if and $apiserver $apiserver.enabled }}
          - path: /apiserver
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            {{- if .Values.ingress.property }}
            property:
              {{- toYaml .Values.ingress.property | nindent 14 }}
            {{- end }}
            backend:
              service:
                name: {{ $apiserver.service.name | default "tapdata-api-svr" }}
                port:
                  number: {{ $apiserver.service.nodePort | default $apiserver.service.port | default 3080 }}
          {{- end }}
          - path: /
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            {{- if .Values.ingress.property }}
            property:
              {{- toYaml .Values.ingress.property | nindent 14 }}
            {{- end }}
            backend:
              service:
                name: {{ $server.service.name | default "tapdata-server-svr" }}
                port:
                  number: {{ $server.service.nodePort | default $server.service.port | default 3030 }}
      {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
{{- end }}
