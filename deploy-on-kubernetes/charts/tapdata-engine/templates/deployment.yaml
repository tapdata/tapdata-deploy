apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tapdata-engine.fullname" . }}
  labels:
    {{- include "tapdata-engine.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tapdata-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "tapdata-engine.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-tapdata-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              URL="{{ .Values.env.backendUrl }}"
              STRIP_PROTO=${URL#http://}
              STRIP_PROTO=${STRIP_PROTO#https://}
              STRIP_PATH=${STRIP_PROTO%%/*}
              HOST=${STRIP_PATH%%:*}
              PORT=${STRIP_PATH##*:}
              echo "Waiting for TapData Server (${HOST}:${PORT}) to be available..."
              until nc -z -w 3 ${HOST} ${PORT}; do
                echo "TapData Server is not available yet, retrying in 5 seconds..."
                sleep 5
              done
              echo "TapData Server is available, starting TapData Engine..."
      containers:
        - name: tapdata-engine
          image: {{ include "tapdata-engine.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: MODULE
              value: "{{ .Values.env.module }}"
            - name: MONGODB_CONNECTION_STRING
              value: "{{ .Values.global.mongodb.hosts }}/{{ .Values.global.mongodb.database }}?authSource={{ .Values.global.mongodb.authSource }}"
            - name: BACKENDURL
              value: "{{ .Values.env.backendUrl }}"
            - name: JAVA_VERSION
              value: "{{ .Values.env.javaVersion }}"
            - name: TZ
              value: "{{ .Values.env.tz }}"
            - name: LICENSE_HOST
              value: "{{ .Values.env.licenseHost }}"
            - name: TAPDATA_WORK_DIR
              value: "/tapdata/apps"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pgrep -f '/tapdata/apps/components/tapdata-agent.jar'
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /tmp/conf
            - name: logs
              mountPath: /tapdata/apps/logs
          command:
            - /tapdata/docker-entrypoint.sh
      volumes:
        - name: config
          configMap:
            name: {{ include "tapdata-engine.fullname" . }}-config
        - name: logs
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
